    <main class="content-page__body">
        <article class="content-card">
            <h1>Ugnsstekt kyckling</h1>
            <p>Majssallad och kall vitlökssås</p>

            <p><strong>Ingredienser:</strong></p>
            <h2 class="recipe-section-title">Kyckling</h2>
            <div class="recipe-checklist" aria-label="Ingredienser kyckling">
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 kg kyckling (t ex kycklingben och lårfilé)</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2 msk japansk soja</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2 msk olivolja</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2 tsk paprikapulver</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 tsk malen spiskummin</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 msk honung</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 klyfta vitlök, riven</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">salt</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">svartpeppar</span>
                </label>
            </div>

            <h2 class="recipe-section-title">Majssallad</h2>
            <div class="recipe-checklist" aria-label="Ingredienser majssallad">
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">800 g majs (avrunnen)</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 kruka färsk koriander, hackad</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 limefrukt (saften)</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 klyfta vitlök, riven</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">150 g fetaost, smulad</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 gul lök, finhackad</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 jalapeño, fintärnad</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">olivolja</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">salt</span>
                </label>
            </div>

            <h2 class="recipe-section-title">Kall vitlökssås</h2>
            <div class="recipe-checklist" aria-label="Ingredienser kall vitlökssås">
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2 dl turkisk yoghurt</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2 dl majonnäs</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 klyfta vitlök, riven</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">0,5 färsk persilja, hackad (eller gräslök)</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">salt</span>
                </label>
            </div>

            <h2 class="recipe-section-title">Tillbehör</h2>
            <div class="recipe-checklist" aria-label="Ingredienser tillbehör">
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">800 g kokt potatis</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1 limefrukt</span>
                </label>
            </div>

            <p><strong>Gör så här:</strong></p>
            <div class="recipe-checklist" aria-label="Tillagningssteg">
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">1. Blanda alla ingredienser till marinaden i en stor bunke. Lägg i kycklingen och vänd runt så att allt täcks. Låt marinera i minst 30 minuter, gärna längre.</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">2. Sätt ugnen på 200 grader.</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">3. Lägg kycklingen i en ugnsform och tillaga i mitten av ugnen i ca 35-40 minuter, tills skinnet är krispigt och innertemperaturen når 82 grader.</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">4. Fräs majsen i olja i en stekpanna tillsammans med vitlök, jalapeño och lök tills den får fin färg. Salta lätt och låt svalna något. Blanda sedan med limejuice, smulad fetaost och koriander.</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">5. Rör ihop alla ingredienser till den kalla vitlökssåsen och ställ i kyl fram till servering. Smaka av.</span>
                </label>
                <label class="recipe-checkitem">
                    <input class="recipe-checkitem__input" type="checkbox">
                    <span class="recipe-checkitem__text">6. Servera kycklingen varmt tillsammans med majssalladen och en klick vitlökssås. Pressa över lite lime och servera med kokt potatis eller bröd om du vill ha en mer mättande måltid.</span>
                </label>
            </div>

            <a class="content-back" href="fortsatt-recept.html">Tillbaka till dagens rätt</a>
        </article>
    </main>
</body>
